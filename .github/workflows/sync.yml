name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://Anuskka123:$HF_TOKEN@huggingface.co/spaces/Anuskka123/email-triage-env
          git push hf main --force